site_name: Cycles Agroecosystem Model
theme:
  name: material
  logo: imgs/cycles_icon.png

plugins:
  - search

nav:
  - Home: index.md
  - Input Files: input.md
  - Output Files: output.md
  - Bug Report Guidelines: bug_report.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
